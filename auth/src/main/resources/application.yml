micronaut:
  application:
    name: unity-iam
  security:
    endpoints:
      logout:
        path: /logout
        get-allowed: true
      login:
        path: /login
      introspection:
        path: /token_info
    intercept-url-map:
      - pattern: /login
        http-method: POST
        access:
          - isAnonymous()
    authentication: bearer
  server:
    context-path: /auth
    cors:
      enabled: true
      configurations:
        web:
          allowed-origins-regex: ${LIBRE311_UI_BASE_URL}
datasources:
  default:
    driver-class-name: com.mysql.cj.jdbc.Driver
    db-type: mysql
flyway:
  datasources:
    default:
      enabled: true

unity:
  auth:
    internal-token: ${UNITY_AUTH_INTERNAL_TOKEN}
