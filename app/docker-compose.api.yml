services:
  libre311-db:
    container_name: libre311-db
    networks:
      - unity-network
    extends:
      file: docker-compose.deps.yml
      service: libre311-db

  local-mail-relay:
    container_name: local-mail-relay
    networks:
      - unity-network
    extends:
      file: docker-compose.deps.yml
      service: local-mail-relay

  libre311-imageserv:
    container_name: libre311-imageserv
    networks:
      - unity-network
    extends:
      file: docker-compose.deps.yml
      service: libre311-imageserv

  libre311-api:
    container_name: libre311-api
    build:
      dockerfile: app/DockerfileAPI
      context: ..
    restart: unless-stopped
    networks:
      - unity-network
    depends_on:
      libre311-db:
        condition: service_healthy
      local-mail-relay:
        condition: service_started
      libre311-imageserv:
        condition: service_started
    env_file:
      - ../.env.docker
    environment:
      JAVA_TOOL_OPTIONS: "-Xdebug -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    ports:
      - "8080:8080"
      - "5005:5005"

networks:
  default:
    name: unity-network
    external: true
  unity-network:
    external: true
