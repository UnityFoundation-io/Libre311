services:
  libre311-db:
    container_name: libre311-db
    image: mysql:8.0
    # NOTE: use of "mysql_native_password" is not recommended: https://dev.mysql.com/doc/refman/8.0/en/upgrading-from-previous-series.html#upgrade-caching-sha2-password
    # (this is just an example, not intended to be a production configuration)
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    networks:
      - unity-network
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: libre311
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptest"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 30s
    ports:
      - "23306:3306"

  local-mail-relay:
    image: axllent/mailpit
    container_name: local-mail-relay
    networks:
      - unity-network
    environment:
      MP_SMTP_AUTH: "unity:password"
    command: ["--smtp-auth-allow-insecure"]
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # UI

  libre311-imageserv:
    image: nginx:alpine
    container_name: libre311-imageserv
    ports:
      - "7000:80"
    volumes:
      - ./image-store:/usr/share/nginx/html/images:ro
    restart: unless-stopped
    networks:
      - unity-network
    command:
      - /bin/sh
      - -c
      - |
        cat <<'EOF' > /etc/nginx/conf.d/default.conf
        map $$http_origin $$cors_origin {
            default "";
            "http://localhost:3000"          $$http_origin;
            "localhost:3000"                 $$http_origin;
            "http://127.0.0.1:3000"          $$http_origin;
            "http://libre311-ui:3000"        $$http_origin;
            "http://libre311-ui-dev:3000"    $$http_origin;
        }

        server {
            listen 80;
            server_name localhost;

            location /images/ {
                root /usr/share/nginx/html;
                autoindex on;

                add_header 'Access-Control-Allow-Origin' $$cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
                add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

                if ($$request_method = 'OPTIONS') {
                    add_header 'Access-Control-Allow-Origin' $$cors_origin always;
                    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
                    add_header 'Access-Control-Max-Age' 1728000;
                    add_header 'Content-Type' 'text/plain; charset=utf-8';
                    add_header 'Content-Length' 0;
                    return 204;
                }
            }
        }
        EOF
        # After writing the file, start Nginx
        nginx -g 'daemon off;'

networks:
  default:
    name: unity-network
    external: true
  unity-network:
    external: true
